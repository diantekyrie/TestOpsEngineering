baseURL = "https://testopseng.com/"
languageCode = "en-us"
title = "TestOps Engineering"
theme = "hello-4s3ti"
paginate = 5
enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  homeSubtitle = "Test operations, strategy, and automation"
  disableReadOtherPosts = true
  enableSharingButtons = false

  description = "TestOps Engineering: test strategy, automation, CI quality gates, and reliability."
  keywords = "testops, qa, quality engineering, software testing, test automation, cicd"

  [params.logo]
    logoText = "TestOps Engineering"
    path = "/img/logo-icon.png"
    alt = "TestOps Engineering"
    logoHomeLink = "/"

[[menu.main]]
  identifier = "services"
  name = "Services"
  url = "/services/"

[[menu.main]]
  identifier = "case-studies"
  name = "Case Studies"
  url = "/case-studies/"

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"

[[menu.main]]
  identifier = "contact"
  name = "Contact"
  url = "/contact/"
